<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}}</title>
  <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent-1: #7209b7;
      --accent-2: #9c88ff;
      --particle-color: #a45cff;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg-lights {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .light {
      position: absolute;
      border-radius: 50%;
      filter: blur(150px);
    }

    .light-1 {
      width: 550px; height: 550px;
      top: -15%; left: -10%;
      animation: drift1 18s ease-in-out infinite;
    }
    .light-2 {
      width: 450px; height: 450px;
      bottom: -18%; right: -12%;
      animation: drift2 18s ease-in-out infinite;
      animation-delay: -6s;
    }

    .bg-lights.success .light-1 {
      background: radial-gradient(circle, #059669 0%, transparent 70%);
      opacity: 0.45;
    }
    .bg-lights.success .light-2 {
      background: radial-gradient(circle, #10b981 0%, transparent 70%);
      opacity: 0.35;
    }

    .bg-lights.error .light-1 {
      background: radial-gradient(circle, #dc2626 0%, transparent 70%);
      opacity: 0.4;
    }
    .bg-lights.error .light-2 {
      background: radial-gradient(circle, #ef4444 0%, transparent 70%);
      opacity: 0.3;
    }

    @keyframes drift1 {
      0%, 100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(80px,-50px) scale(1.1); }
      66% { transform: translate(-50px,70px) scale(0.9); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(-70px,-60px) scale(1.12); }
      66% { transform: translate(80px,50px) scale(0.88); }
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      opacity: 0.5;
      animation: rise 25s linear infinite;
    }

    @keyframes rise {
      0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
      5% { opacity: 0.5; transform: translateY(95vh) translateX(8px) scale(1); }
      95% { opacity: 0.3; transform: translateY(5vh) translateX(40px) scale(0.7); }
      100% { transform: translateY(-5vh) translateX(55px) scale(0); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 460px;
      animation: fadeUp 0.7s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      transition: border-color 0.3s;
    }

    .card.success {
      border-color: rgba(16,185,129,0.2);
      box-shadow:
        0 25px 50px rgba(0,0,0,0.5),
        0 0 80px rgba(16,185,129,0.06);
    }
    .card.error {
      border-color: rgba(239,68,68,0.2);
      box-shadow:
        0 25px 50px rgba(0,0,0,0.5),
        0 0 80px rgba(239,68,68,0.06);
    }

    .icon-wrapper {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      animation: bob 3s ease-in-out infinite;
    }

    .success .icon-wrapper {
      background: linear-gradient(135deg, #059669, #10b981);
      box-shadow:
        0 15px 35px rgba(16,185,129,0.35),
        0 0 50px rgba(16,185,129,0.15);
    }
    .error .icon-wrapper {
      background: linear-gradient(135deg, #dc2626, #ef4444);
      box-shadow:
        0 15px 35px rgba(239,68,68,0.35),
        0 0 50px rgba(239,68,68,0.15);
    }

    .icon-wrapper i {
      width: 36px;
      height: 36px;
      color: #fff;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.02); }
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .success h1 {
      background-image: linear-gradient(135deg, #10b981, #34d399);
    }
    .error h1 {
      background-image: linear-gradient(135deg, #ef4444, #f87171);
    }

    .message {
      font-size: 14px;
      color: #999;
      line-height: 1.7;
    }

    .highlight {
      color: var(--accent-2);
      font-weight: 600;
    }

    @media (max-width: 500px) {
      .card { padding: 40px 28px; border-radius: 20px; }
      h1 { font-size: 21px; }
      .icon-wrapper { width: 68px; height: 68px; border-radius: 16px; }
      .icon-wrapper i { width: 30px; height: 30px; }
    }
  </style>
</head>
<body>

  <div class="bg-lights {{PAGE_CLASS}}" id="bgLights">
    <div class="light light-1"></div>
    <div class="light light-2"></div>
  </div>

  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="card {{PAGE_CLASS}}">
      <div class="icon-wrapper">
        <i data-lucide="{{ICON}}"></i>
      </div>
      <h1>{{TITLE}}</h1>
      <p class="message">{{MESSAGE}}</p>
    </div>
  </div>

  <script>
    function initIcons() {
      if (window.lucide && lucide.createIcons) {
        lucide.createIcons();
      } else {
        setTimeout(initIcons, 50);
      }
    }

    (function(){
      var cls = '{{PAGE_CLASS}}';
      var color = cls === 'success' ? '#10b981' : cls === 'error' ? '#ef4444' : '#a45cff';
      var c = document.getElementById('particles');

      for (var i = 0; i < 18; i++) {
        var p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random()*100+'%';
        p.style.animationDelay = -(Math.random()*25)+'s';
        p.style.animationDuration = (18+Math.random()*12)+'s';
        p.style.background = color;
        p.style.boxShadow = '0 0 10px '+color+', 0 0 5px '+color;
        var s = 2+Math.random()*2;
        p.style.width = s+'px';
        p.style.height = s+'px';
        c.appendChild(p);
      }
    })();

    document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
    document.addEventListener('keydown', function(e){
      if (
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && /^[IJC]$/i.test(e.key)) ||
        (e.ctrlKey && e.key.toLowerCase() === 'u')
      ) e.preventDefault();
    });

    initIcons();
  </script>
</body>
</html>
